<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Configurator</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --border: #dfe1e6;
        --muted: #6b778c;
        --text: #172b4d;
        --surface: #ffffff;
        --soft: #f4f5f7;
        --brand: #0c66e4;
        --danger: #ae2e24;
        --danger-border: #ffbdad;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--surface);
        color: var(--text);
      }

      main {
        display: grid;
        gap: 16px;
        padding: 18px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
      }

      h2 {
        font-size: 15px;
      }

      h3 {
        font-size: 14px;
      }

      label {
        color: var(--muted);
        display: grid;
        font-size: 12px;
        gap: 4px;
      }

      input,
      select {
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        min-height: 34px;
        padding: 6px 8px;
        width: 100%;
      }

      .role {
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        padding: 4px 10px;
        white-space: nowrap;
      }

      .toolbar,
      .form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        align-items: center;
        background: var(--brand);
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-size: 13px;
        min-height: 32px;
        padding: 6px 10px;
      }

      button.secondary {
        background: var(--soft);
        color: var(--text);
      }

      button.danger {
        background: var(--danger);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .status,
      .meta,
      .hint {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .status {
        font-size: 13px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        display: none;
        gap: 10px;
        padding: 12px;
      }

      .panel.active {
        display: grid;
      }

      .form-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .departments {
        display: grid;
        gap: 10px;
      }

      .department {
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      .department-header {
        align-items: center;
        background: var(--soft);
        display: flex;
        gap: 10px;
        justify-content: space-between;
        padding: 10px 12px;
      }

      .department-title {
        align-items: center;
        display: flex;
        gap: 8px;
        min-width: 0;
      }

      .swatch {
        border-radius: 4px;
        flex: 0 0 auto;
        height: 16px;
        width: 16px;
      }

      .color-picker {
        display: grid;
        gap: 8px;
        grid-column: 1 / -1;
        grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      }

      .color-option {
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        display: grid;
        gap: 6px;
        min-height: 58px;
        padding: 8px;
        position: relative;
      }

      .color-option input {
        height: 1px;
        min-height: 1px;
        opacity: 0;
        position: absolute;
        width: 1px;
      }

      .color-option input:checked + .color-swatch {
        box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--brand);
      }

      .color-option.claimed {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .color-swatch {
        border-radius: 4px;
        height: 22px;
        overflow: hidden;
        position: relative;
        width: 100%;
      }

      .color-option.claimed .color-swatch::after {
        background: repeating-linear-gradient(
          -45deg,
          rgba(23, 43, 77, 0.45),
          rgba(23, 43, 77, 0.45) 2px,
          transparent 2px,
          transparent 6px
        );
        content: "";
        inset: 0;
        position: absolute;
      }

      .color-label {
        align-items: center;
        display: flex;
        font-size: 12px;
        justify-content: space-between;
        min-width: 0;
      }

      .color-label span:first-child {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .claimed-badge {
        background: var(--soft);
        border-radius: 999px;
        color: var(--muted);
        flex: 0 0 auto;
        font-size: 11px;
        padding: 1px 6px;
      }

      .name {
        overflow-wrap: anywhere;
      }

      .manager-list,
      .project-list {
        display: grid;
        gap: 8px;
        padding: 10px 12px;
      }

      .project {
        align-items: start;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        display: grid;
        gap: 6px;
        padding: 10px;
      }

      .project-header {
        align-items: start;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }

      .project-details {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .icon-button {
        align-items: center;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 6px;
        color: var(--muted);
        display: inline-flex;
        flex: 0 0 auto;
        font-size: 15px;
        justify-content: center;
        min-height: 28px;
        padding: 0;
        width: 28px;
      }

      .icon-button:hover,
      .icon-button:focus {
        background: #ffebe6;
        border-color: var(--danger-border);
        color: var(--danger);
      }

      .empty,
      .message {
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        padding: 14px;
      }

      .message.error {
        border-color: var(--danger-border);
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Project Configurator</h1>
          <p class="status" id="status">Loading project configuration...</p>
        </div>
        <span class="role" id="role">Loading</span>
      </header>
      <section class="toolbar" id="toolbar"></section>
      <section class="panel" id="actionPanel"></section>
      <section id="message"></section>
      <section class="departments" id="departments"></section>
    </main>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      var currentMemberId = "";
      var currentBoardId = "";
      var currentState = null;
      var activeAction = "";
      var colorHex = {
        green: "#4bce97",
        yellow: "#f5cd47",
        orange: "#fea362",
        red: "#f87168",
        purple: "#9f8fef",
        blue: "#579dff",
        sky: "#6cc3e0",
        lime: "#94c748",
        pink: "#e774bb",
        black: "#8590a2",
        green_light: "#baf3db",
        yellow_light: "#f8e6a0",
        orange_light: "#fedec8",
        red_light: "#ffd5d2",
        purple_light: "#dfd8fd",
        blue_light: "#cce0ff",
        sky_light: "#c6edfb",
        lime_light: "#d3f1a7",
        pink_light: "#fdd0ec",
        black_light: "#dcdfe4",
        green_dark: "#1f845a",
        yellow_dark: "#946f00",
        orange_dark: "#c25100",
        red_dark: "#c9372c",
        purple_dark: "#6e5dc6",
        blue_dark: "#0c66e4",
        sky_dark: "#227d9b",
        lime_dark: "#5b7f24",
        pink_dark: "#ae4787",
        black_dark: "#626f86",
      };
      var roleLabels = {
        admin: "Workspace admin",
        department_manager: "Department manager",
        project_manager: "Project manager",
        normal_user: "Normal user",
      };

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function normalizeName(value) {
        return String(value).trim().toLowerCase();
      }

      function colorDisplayName(color) {
        return String(color)
          .split("_")
          .map(function (part) {
            return part.charAt(0).toUpperCase() + part.slice(1);
          })
          .join(" ");
      }

      function groupByOwner(items) {
        return items.reduce(function (groups, item) {
          if (!groups[item.ownerId]) {
            groups[item.ownerId] = [];
          }
          groups[item.ownerId].push(item);
          return groups;
        }, {});
      }

      function managerNames(items) {
        if (!items || items.length === 0) {
          return "No managers assigned";
        }

        return items
          .map(function (item) {
            return item.username
              ? item.displayName + " (" + item.username + ")"
              : item.displayName;
          })
          .join(", ");
      }

      function memberOptions() {
        return currentState.members
          .map(function (member) {
            var label = member.username
              ? member.displayName + " (" + member.username + ")"
              : member.displayName;
            return (
              '<option value="' +
              escapeHtml(member.trelloMemberId) +
              '">' +
              escapeHtml(label) +
              "</option>"
            );
          })
          .join("");
      }

      function departmentOptions(departments) {
        return departments
          .map(function (department) {
            return (
              '<option value="' +
              escapeHtml(department.id) +
              '">' +
              escapeHtml(department.name) +
              "</option>"
            );
          })
          .join("");
      }

      function projectOptions(projects) {
        return projects
          .map(function (project) {
            var department = currentState.departments.find(function (item) {
              return item.id === project.departmentId;
            });
            var label = department
              ? department.name + " / " + project.name
              : project.name;
            return (
              '<option value="' +
              escapeHtml(project.id) +
              '">' +
              escapeHtml(label) +
              "</option>"
            );
          })
          .join("");
      }

      function manageableDepartmentIds(capabilityIds) {
        if (capabilityIds.indexOf("*") !== -1) {
          return currentState.departments.map(function (department) {
            return department.id;
          });
        }

        return capabilityIds;
      }

      function getManageableDepartments(capabilityIds) {
        var ids = manageableDepartmentIds(capabilityIds);
        return currentState.departments.filter(function (department) {
          return ids.indexOf(department.id) !== -1;
        });
      }

      function getManageableProjects() {
        var ids = manageableDepartmentIds(
          currentState.capabilities.canAssignProjectManagersInDepartmentIds
        );
        return currentState.projects.filter(function (project) {
          return ids.indexOf(project.departmentId) !== -1;
        });
      }

      function showMessage(text, isError) {
        var target = document.getElementById("message");
        target.innerHTML = text
          ? '<div class="message ' +
            (isError ? "error" : "") +
            '">' +
            escapeHtml(text) +
            "</div>"
          : "";
      }

      function renderToolbar(state) {
        var toolbar = document.getElementById("toolbar");
        var buttons = [];

        if (state.capabilities.canCreateDepartments) {
          buttons.push(
            '<button type="button" data-action="createDepartment">Create department</button>'
          );
        }

        if (state.capabilities.canAssignDepartmentManagers) {
          buttons.push(
            '<button type="button" class="secondary" data-action="assignDepartmentManager">Assign department manager</button>'
          );
          buttons.push(
            '<button type="button" class="secondary" data-command="syncMembers">Sync members</button>'
          );
        }

        if (state.capabilities.canCreateProjectsInDepartmentIds.length > 0) {
          buttons.push(
            '<button type="button" data-action="createProject">Create project</button>'
          );
        }

        if (
          state.capabilities.canAssignProjectManagersInDepartmentIds.length > 0
        ) {
          buttons.push(
            '<button type="button" class="secondary" data-action="assignProjectManager">Assign project manager</button>'
          );
        }

        toolbar.innerHTML = buttons.join("");
        toolbar.querySelectorAll("button[data-action]").forEach(function (button) {
          button.addEventListener("click", function () {
            openAction(button.getAttribute("data-action"));
          });
        });
        toolbar.querySelectorAll("button[data-command]").forEach(function (button) {
          button.addEventListener("click", function () {
            if (button.getAttribute("data-command") === "syncMembers") {
              synchronizeMembers(button);
            }
          });
        });
      }

      function openAction(action) {
        activeAction = activeAction === action ? "" : action;
        renderActionPanel();
      }

      function renderActionPanel() {
        var panel = document.getElementById("actionPanel");

        if (!activeAction || !currentState) {
          panel.className = "panel";
          panel.innerHTML = "";
          return;
        }

        panel.className = "panel active";

        if (activeAction === "createDepartment") {
          panel.innerHTML = renderCreateDepartmentForm();
        } else if (activeAction === "assignDepartmentManager") {
          panel.innerHTML = renderAssignDepartmentManagerForm();
        } else if (activeAction === "createProject") {
          panel.innerHTML = renderCreateProjectForm();
        } else if (activeAction === "assignProjectManager") {
          panel.innerHTML = renderAssignProjectManagerForm();
        }

        var form = panel.querySelector("form");
        if (form) {
          form.addEventListener("submit", submitActiveAction);
        }
        var cancel = panel.querySelector("[data-cancel]");
        if (cancel) {
          cancel.addEventListener("click", function () {
            activeAction = "";
            renderActionPanel();
          });
        }
      }

      function renderCreateDepartmentForm() {
        var disabled = currentState.colors.available.length === 0 ? "disabled" : "";
        var hint =
          currentState.colors.available.length === 0
            ? "All Trello colors are already claimed by active departments."
            : "Choose an unclaimed Trello label color.";

        return (
          "<form>" +
          "<h2>Create department</h2>" +
          '<div class="form-grid">' +
          '<label>Name<input name="name" required maxlength="120" /></label>' +
          renderColorPicker("departmentColor") +
          "</div>" +
          '<p class="hint">' +
          escapeHtml(hint) +
          "</p>" +
          '<div class="form-actions">' +
          '<button type="submit" ' +
          disabled +
          ">Create</button>" +
          '<button type="button" class="secondary" data-cancel>Cancel</button>' +
          "</div>" +
          "</form>"
        );
      }

      function renderColorPicker(name) {
        var selectedColor = currentState.colors.available[0] || "";
        var used = currentState.colors.used;

        return (
          '<div class="color-picker" role="radiogroup" aria-label="Department color">' +
          currentState.colors.all
            .map(function (color) {
              var claimed = used.indexOf(color) !== -1;
              var checked = color === selectedColor ? "checked" : "";
              var disabled = claimed ? "disabled" : "";
              var label = colorDisplayName(color);

              return (
                '<label class="color-option ' +
                (claimed ? "claimed" : "") +
                '" title="' +
                escapeHtml(claimed ? label + " is already claimed" : label) +
                '">' +
                '<input type="radio" name="' +
                escapeHtml(name) +
                '" value="' +
                escapeHtml(color) +
                '" required ' +
                checked +
                " " +
                disabled +
                " />" +
                '<span class="color-swatch" style="background:' +
                (colorHex[color] || "#dfe1e6") +
                '"></span>' +
                '<span class="color-label"><span>' +
                escapeHtml(label) +
                "</span>" +
                (claimed ? '<span class="claimed-badge">Claimed</span>' : "") +
                "</span>" +
                "</label>"
              );
            })
            .join("") +
          "</div>"
        );
      }

      function renderAssignDepartmentManagerForm() {
        if (currentState.departments.length === 0 || currentState.members.length === 0) {
          return emptyFormMessage(
            "Assign department manager",
            "Create a department and make sure members are synced before assigning managers."
          );
        }

        return (
          "<form>" +
          "<h2>Assign department manager</h2>" +
          '<div class="form-grid">' +
          '<label>Department<select name="departmentId" required>' +
          departmentOptions(currentState.departments) +
          "</select></label>" +
          '<label>Member<select name="managerTrelloMemberId" required>' +
          memberOptions() +
          "</select></label>" +
          "</div>" +
          '<div class="form-actions">' +
          '<button type="submit">Assign</button>' +
          '<button type="button" class="secondary" data-cancel>Cancel</button>' +
          "</div>" +
          "</form>"
        );
      }

      function renderCreateProjectForm() {
        var departments = getManageableDepartments(
          currentState.capabilities.canCreateProjectsInDepartmentIds
        );

        if (departments.length === 0) {
          return emptyFormMessage(
            "Create project",
            "No departments are available for project creation."
          );
        }

        return (
          "<form>" +
          "<h2>Create project</h2>" +
          '<div class="form-grid">' +
          '<label>Department<select name="departmentId" required>' +
          departmentOptions(departments) +
          "</select></label>" +
          '<label>Name<input name="name" required maxlength="160" /></label>' +
          "</div>" +
          '<p class="hint">Trello label text is created automatically as Department: Project Name.</p>' +
          '<div class="form-actions">' +
          '<button type="submit">Create</button>' +
          '<button type="button" class="secondary" data-cancel>Cancel</button>' +
          "</div>" +
          "</form>"
        );
      }

      function renderAssignProjectManagerForm() {
        var projects = getManageableProjects();

        if (projects.length === 0 || currentState.members.length === 0) {
          return emptyFormMessage(
            "Assign project manager",
            "Create a project and make sure members are synced before assigning project managers."
          );
        }

        return (
          "<form>" +
          "<h2>Assign project manager</h2>" +
          '<div class="form-grid">' +
          '<label>Project<select name="projectId" required>' +
          projectOptions(projects) +
          "</select></label>" +
          '<label>Member<select name="managerTrelloMemberId" required>' +
          memberOptions() +
          "</select></label>" +
          "</div>" +
          '<div class="form-actions">' +
          '<button type="submit">Assign</button>' +
          '<button type="button" class="secondary" data-cancel>Cancel</button>' +
          "</div>" +
          "</form>"
        );
      }

      function emptyFormMessage(title, message) {
        return (
          "<div>" +
          "<h2>" +
          escapeHtml(title) +
          "</h2>" +
          '<p class="hint">' +
          escapeHtml(message) +
          "</p>" +
          '<div class="form-actions"><button type="button" class="secondary" data-cancel>Close</button></div>' +
          "</div>"
        );
      }

      async function submitActiveAction(event) {
        event.preventDefault();
        showMessage("", false);

        var form = event.currentTarget;
        var button = form.querySelector('button[type="submit"]');
        var formData = new FormData(form);

        try {
          if (button) {
            button.disabled = true;
          }

          var successMessage = "Saved.";

          if (activeAction === "createDepartment") {
            await submitCreateDepartment(formData);
          } else if (activeAction === "assignDepartmentManager") {
            await apiRequest(
              "/api/project-configurator/departments/" +
                encodeURIComponent(formData.get("departmentId")) +
                "/managers",
              {
                managerTrelloMemberId: String(
                  formData.get("managerTrelloMemberId")
                ),
              }
            );
          } else if (activeAction === "createProject") {
            successMessage = await submitCreateProject(formData);
          } else if (activeAction === "assignProjectManager") {
            await apiRequest(
              "/api/project-configurator/projects/" +
                encodeURIComponent(formData.get("projectId")) +
                "/managers",
              {
                managerTrelloMemberId: String(
                  formData.get("managerTrelloMemberId")
                ),
              }
            );
          }

          activeAction = "";
          await loadState();
          showMessage(successMessage, false);
        } catch (error) {
          showMessage(error.message || error, true);
        } finally {
          if (button) {
            button.disabled = false;
          }
        }
      }

      async function submitCreateDepartment(formData) {
        var name = String(formData.get("name") || "").trim();
        var departmentColor = String(formData.get("departmentColor") || "");

        if (
          currentState.departments.some(function (department) {
            return normalizeName(department.name) === normalizeName(name);
          })
        ) {
          throw new Error("A department with that name already exists.");
        }

        if (currentState.colors.available.indexOf(departmentColor) === -1) {
          throw new Error("That department color is already claimed.");
        }

        await apiRequest("/api/project-configurator/departments", {
          name: name,
          departmentColor: departmentColor,
        });
      }

      async function submitCreateProject(formData) {
        var departmentId = String(formData.get("departmentId") || "");
        var name = String(formData.get("name") || "").trim();

        if (
          currentState.projects.some(function (project) {
            return (
              project.departmentId === departmentId &&
              normalizeName(project.name) === normalizeName(name)
            );
          })
        ) {
          throw new Error("A project with that name already exists in this department.");
        }

        var result = await apiRequest("/api/project-configurator/projects", {
          departmentId: departmentId,
          name: name,
        });

        if (result.labelSync && result.labelSync.failed > 0) {
          return "Project created, but some Trello labels failed to sync.";
        }

        return "Project created and labels synced.";
      }

      function canDeleteProject(project) {
        var ids = currentState.capabilities.canDeleteProjectsInDepartmentIds || [];

        return ids.indexOf("*") !== -1 || ids.indexOf(project.departmentId) !== -1;
      }

      async function deleteProjectById(projectId) {
        var project = currentState.projects.find(function (item) {
          return item.id === projectId;
        });
        var label = project ? project.name : "this project";

        if (
          !window.confirm(
            "Permanently delete " +
              label +
              "? This cannot be undone."
          )
        ) {
          return "";
        }

        await apiRequest(
          "/api/project-configurator/projects/" +
            encodeURIComponent(projectId),
          {},
          "DELETE"
        );

        return "Project deleted.";
      }

      async function deleteProjectFromCard(button) {
        showMessage("", false);

        try {
          button.disabled = true;
          var message = await deleteProjectById(
            String(button.getAttribute("data-delete-project") || "")
          );

          if (!message) {
            return;
          }

          await loadState();
          showMessage(message, false);
        } catch (error) {
          showMessage(error.message || error, true);
        } finally {
          button.disabled = false;
        }
      }

      async function synchronizeMembers(button) {
        showMessage("", false);

        try {
          button.disabled = true;

          if (!currentBoardId) {
            throw new Error("Could not determine the current Trello board.");
          }

          var result = await apiRequest("/api/project-configurator/members/sync", {
            trelloBoardId: currentBoardId,
          });

          await loadState();
          showMessage(
            "Member sync complete. Added " +
              result.added +
              " of " +
              result.total +
              " board members.",
            false
          );
        } catch (error) {
          showMessage(error.message || error, true);
        } finally {
          button.disabled = false;
        }
      }

      async function apiRequest(url, body, method) {
        var response = await fetch(url, {
          method: method || "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(
            Object.assign({ trelloMemberId: currentMemberId }, body)
          ),
        });

        if (!response.ok) {
          var errorBody = await response.json().catch(function () {
            return {};
          });
          throw new Error(errorBody.error || "Request failed.");
        }

        if (response.status === 204) {
          return {};
        }

        return response.json();
      }

      function renderState(state) {
        currentState = state;
        var departments = document.getElementById("departments");
        var role = document.getElementById("role");
        var status = document.getElementById("status");
        var projectsByDepartment = state.projects.reduce(function (
          groups,
          project
        ) {
          if (!groups[project.departmentId]) {
            groups[project.departmentId] = [];
          }
          groups[project.departmentId].push(project);
          return groups;
        }, {});
        var departmentManagers = groupByOwner(state.departmentManagers);
        var projectManagers = groupByOwner(state.projectManagers);

        role.textContent = roleLabels[state.viewer.role] || state.viewer.role;
        status.textContent =
          state.projects.length +
          " projects across " +
          state.departments.length +
          " departments";
        renderToolbar(state);
        renderActionPanel();

        if (state.departments.length === 0) {
          departments.innerHTML =
            '<div class="empty">No departments have been configured yet.</div>';
          return;
        }

        departments.innerHTML = state.departments
          .map(function (department) {
            var projects = projectsByDepartment[department.id] || [];
            var managers = departmentManagers[department.id] || [];
            var managerHtml = state.capabilities.canViewDepartmentManagers
              ? '<div class="manager-list"><p class="meta">Department managers: ' +
                escapeHtml(managerNames(managers)) +
                "</p></div>"
              : "";
            var projectsHtml =
              projects.length === 0
                ? '<p class="meta">No projects configured.</p>'
                : projects
                    .map(function (project) {
                      var deleteButton = canDeleteProject(project)
                        ? '<button type="button" class="icon-button" title="Delete project" aria-label="Delete ' +
                          escapeHtml(project.name) +
                          '" data-delete-project="' +
                          escapeHtml(project.id) +
                          '">&#128465;</button>'
                        : "";

                      return (
                        '<article class="project">' +
                        '<div class="project-header">' +
                        '<div class="project-details">' +
                        "<h3>" +
                        escapeHtml(project.name) +
                        "</h3>" +
                        '<p class="meta">Label: ' +
                        escapeHtml(project.labelText) +
                        "</p>" +
                        '<p class="meta">Project managers: ' +
                        escapeHtml(managerNames(projectManagers[project.id] || [])) +
                        "</p>" +
                        "</div>" +
                        deleteButton +
                        "</div>" +
                        "</article>"
                      );
                    })
                    .join("");

            return (
              '<article class="department">' +
              '<div class="department-header">' +
              '<div class="department-title">' +
              '<span class="swatch" style="background:' +
              (colorHex[department.departmentColor] || "#dfe1e6") +
              '"></span>' +
              '<h2 class="name">' +
              escapeHtml(department.name) +
              "</h2>" +
              "</div>" +
              "</div>" +
              managerHtml +
              '<div class="project-list">' +
              projectsHtml +
              "</div>" +
              "</article>"
            );
          })
          .join("");

        departments
          .querySelectorAll("button[data-delete-project]")
          .forEach(function (button) {
            button.addEventListener("click", function () {
              deleteProjectFromCard(button);
            });
          });
      }

      function showError(error) {
        document.getElementById("role").textContent = "Error";
        document.getElementById("status").textContent =
          "Could not load configuration.";
        document.getElementById("departments").innerHTML =
          '<div class="message error">' +
          escapeHtml(error.message || error) +
          "</div>";
      }

      async function loadState() {
        if (!currentMemberId || !currentBoardId) {
          var t = window.TrelloPowerUp.iframe();
          var member = currentMemberId ? { id: currentMemberId } : await t.member("id");
          var board = currentBoardId ? { id: currentBoardId } : await t.board("id");

          if (!member || !member.id) {
            throw new Error("Could not determine the current Trello member.");
          }

          if (!board || !board.id) {
            throw new Error("Could not determine the current Trello board.");
          }

          currentMemberId = member.id;
          currentBoardId = board.id;
        }

        var response = await fetch("/api/project-configurator/state", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ trelloMemberId: currentMemberId }),
        });

        if (!response.ok) {
          var body = await response.json().catch(function () {
            return {};
          });
          throw new Error(body.error || "State request failed.");
        }

        renderState(await response.json());
      }

      loadState().catch(showError);
    </script>
  </body>
</html>
