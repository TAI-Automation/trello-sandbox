<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Priority</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --border: #dfe1e6;
        --muted: #626f86;
        --soft: #f1f2f4;
        --text: #172b4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        color: var(--text);
        margin: 0;
      }

      main {
        align-items: center;
        display: flex;
        gap: 10px;
        min-height: 72px;
        padding: 10px 2px;
      }

      .badge {
        align-items: center;
        border-radius: 4px;
        display: inline-flex;
        font-size: 13px;
        font-weight: 600;
        gap: 6px;
        min-height: 28px;
        padding: 4px 8px;
      }

      .blue {
        background: #e9f2ff;
        color: #0055cc;
      }

      .green {
        background: #dcfff1;
        color: #216e4e;
      }

      .yellow {
        background: #fff7d6;
        color: #7f5f01;
      }

      .orange {
        background: #fff3eb;
        color: #a54800;
      }

      .red {
        background: #ffedeb;
        color: #ae2e24;
      }

      .empty {
        background: var(--soft);
        color: var(--muted);
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge empty" id="priorityBadge">Loading...</span>
      <span class="meta" id="status"></span>
    </main>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      var t = window.TrelloPowerUp.iframe();

      async function apiRequest(url, options) {
        var response = await fetch(
          url,
          Object.assign(
            {
              headers: { "Content-Type": "application/json" },
            },
            options || {}
          )
        );

        if (!response.ok) {
          throw new Error("Request failed.");
        }

        return response.json();
      }

      function renderPriority(priority, canModify) {
        var badge = document.getElementById("priorityBadge");
        var status = document.getElementById("status");

        if (!priority) {
          badge.className = "badge empty";
          badge.textContent = "No priority set";
        } else {
          badge.className = "badge " + priority.color;
          badge.textContent = "Priority " + priority.value;
        }

        status.textContent = canModify ? "" : "Read-only";
      }

      async function loadState() {
        var member = await t.member("id");
        var card = await t.card("id");

        if (!member || !member.id || !card || !card.id) {
          throw new Error("Missing Trello context.");
        }

        var state = await apiRequest("/api/label-priority/state", {
          method: "POST",
          body: JSON.stringify({
            trelloMemberId: member.id,
            trelloCardId: card.id,
          }),
        });

        renderPriority(state.priority, Boolean(state.canModify));
      }

      loadState().catch(function () {
        document.getElementById("priorityBadge").className = "badge empty";
        document.getElementById("priorityBadge").textContent =
          "Priority unavailable";
      });
    </script>
  </body>
</html>
