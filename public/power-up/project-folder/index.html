<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Folder Power-Up</title>
  </head>
  <body>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      function getLabelIds(card) {
        var labels = card && Array.isArray(card.labels) ? card.labels : [];

        return labels
          .map(function (label) {
            return label && typeof label.id === "string" ? label.id.trim() : "";
          })
          .filter(Boolean);
      }

      async function resolveProjectFolder(t) {
        var card = await t.card("labels");
        var board = await t.board("id");
        var boardId = board && typeof board.id === "string" ? board.id.trim() : "";
        var labelIds = getLabelIds(card);

        if (!boardId || labelIds.length === 0) {
          return { matched: false, routes: [] };
        }

        var response = await fetch("/api/project-folder/resolve", {
          method: "POST",
          headers: {
            "content-type": "application/json",
          },
          body: JSON.stringify({ boardId: boardId, labelIds: labelIds }),
        });

        if (!response.ok) {
          return { matched: false, routes: [] };
        }

        return response.json();
      }

      function projectFolderButton() {
        return {
          text: "Open Project Folder",
          callback: function (t) {
            return t.modal({
              title: "Open Project Folder",
              url: "/power-up/project-folder/frame.html",
              height: 220,
              fullscreen: false,
            });
          },
        };
      }

      window.TrelloPowerUp.initialize({
        "card-buttons": async function (t) {
          var result = await resolveProjectFolder(t);

          return result &&
            result.matched &&
            Array.isArray(result.routes) &&
            result.routes.length > 0
            ? [projectFolderButton()]
            : [];
        },

        "card-back-section": function (t) {
          return {
            title: "Open Project Folder",
            icon:
              window.location.origin +
              "/power-up/project-folder/icons/section-icon-144.svg",
            content: {
              type: "iframe",
              url: t.signUrl("./section.html"),
              height: 1,
            },
            action: projectFolderButton(),
          };
        },
      });
    </script>
  </body>
</html>
