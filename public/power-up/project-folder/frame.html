<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Project Folder</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --border: #dfe1e6;
        --brand: #0c66e4;
        --muted: #626f86;
        --soft: #f1f2f4;
        --surface: #ffffff;
        --text: #172b4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--surface);
        color: var(--text);
        margin: 0;
      }

      main {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
        letter-spacing: 0;
      }

      .routes {
        display: grid;
        gap: 12px;
      }

      .route {
        border: 1px solid var(--border);
        border-radius: 6px;
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      .route-title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.35;
      }

      .path {
        background: var(--soft);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        line-height: 1.4;
        overflow-wrap: anywhere;
        padding: 10px;
        user-select: text;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        align-items: center;
        background: var(--brand);
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-size: 13px;
        justify-content: center;
        min-height: 34px;
        padding: 7px 12px;
      }

      button.secondary {
        background: var(--soft);
        color: var(--text);
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        min-height: 18px;
      }

      [hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Project Folder</h1>
      <div class="routes" id="routes">
        <p class="status">Loading...</p>
      </div>
      <p class="status" id="status"></p>
    </main>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      function getLabelNames(card) {
        var labels = card && Array.isArray(card.labels) ? card.labels : [];

        return labels
          .map(function (label) {
            return label && typeof label.name === "string" ? label.name.trim() : "";
          })
          .filter(Boolean);
      }

      function setStatus(text) {
        document.getElementById("status").textContent = text;
      }

      function toFileUrl(path) {
        if (path.indexOf("\\\\") !== 0) {
          return "";
        }

        return "file://" + path.slice(2).replace(/\\/g, "/");
      }

      async function resolveProjectFolder() {
        var t = window.TrelloPowerUp.iframe();
        var card = await t.card("labels");
        var labels = getLabelNames(card);

        if (labels.length === 0) {
          return { matched: false, routes: [] };
        }

        var response = await fetch("/api/project-folder/resolve", {
          method: "POST",
          headers: {
            "content-type": "application/json",
          },
          body: JSON.stringify({ labels: labels }),
        });

        if (!response.ok) {
          throw new Error("Project folder lookup failed.");
        }

        return response.json();
      }

      function createButton(text, className, onClick) {
        var button = document.createElement("button");
        button.type = "button";
        button.textContent = text;
        button.className = className || "";
        button.addEventListener("click", onClick);

        return button;
      }

      function renderRoute(route) {
        var routeElement = document.createElement("section");
        var title = document.createElement("p");
        var path = document.createElement("p");
        var actions = document.createElement("div");
        var folderPath = route.folderPath;
        var labelName =
          typeof route.labelName === "string" && route.labelName.trim()
            ? route.labelName.trim()
            : "Project";

        routeElement.className = "route";
        title.className = "route-title";
        title.textContent = 'Label "' + labelName + '":';
        path.className = "path";
        path.textContent = folderPath;
        actions.className = "actions";
        actions.appendChild(
          createButton("Try Open Folder", "", function () {
            var fileUrl = toFileUrl(folderPath);

            if (!fileUrl) {
              setStatus("This folder path cannot be opened by the browser.");
              return;
            }

            window.location.href = fileUrl;
            setStatus(
              "Tried to open the folder. If the browser blocks it, use Copy Path."
            );
          })
        );
        actions.appendChild(
          createButton("Copy Path", "secondary", async function () {
            try {
              await navigator.clipboard.writeText(folderPath);
              setStatus("Path copied.");
            } catch (_error) {
              setStatus("Could not copy automatically. Select the path above and copy it.");
            }
          })
        );

        routeElement.appendChild(title);
        routeElement.appendChild(path);
        routeElement.appendChild(actions);

        return routeElement;
      }

      async function loadProjectFolder() {
        var routesElement = document.getElementById("routes");

        try {
          var result = await resolveProjectFolder();

          routesElement.textContent = "";

          if (
            !result ||
            !result.matched ||
            !Array.isArray(result.routes) ||
            result.routes.length === 0
          ) {
            var empty = document.createElement("p");
            empty.className = "status";
            empty.textContent = "No project folder route found for this card.";
            routesElement.appendChild(empty);
            setStatus("Add a routed project label to show a folder path.");
            return;
          }

          result.routes.forEach(function (route) {
            routesElement.appendChild(renderRoute(route));
          });
          setStatus("Copy Path is the reliable option if the browser blocks opening folders.");
        } catch (_error) {
          routesElement.textContent = "";
          var error = document.createElement("p");
          error.className = "status";
          error.textContent = "Could not load the project folder paths.";
          routesElement.appendChild(error);
          setStatus("Close this window and try again.");
        }
      }

      loadProjectFolder();
    </script>
  </body>
</html>
