<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Project Folder Section</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --border: #dfe1e6;
        --brand: #0c66e4;
        --muted: #626f86;
        --soft: #f1f2f4;
        --surface: #ffffff;
        --text: #172b4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--surface);
        color: var(--text);
        margin: 0;
      }

      main {
        display: grid;
        gap: 8px;
        padding: 0 0 2px;
      }

      p {
        margin: 0;
      }

      .routes {
        display: grid;
        gap: 8px;
      }

      .route {
        border: 1px solid var(--border);
        border-radius: 6px;
        display: grid;
        gap: 7px;
        padding: 8px;
      }

      .route-head {
        align-items: center;
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .route-title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .path {
        background: var(--soft);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.35;
        overflow-wrap: anywhere;
        padding: 7px 8px;
        user-select: text;
      }

      button {
        align-items: center;
        background: var(--brand);
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-size: 11px;
        justify-content: center;
        min-height: 28px;
        padding: 5px 8px;
        white-space: nowrap;
      }

      .status {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="routes" id="routes">
        <p class="status">Loading project folders...</p>
      </section>
      <p class="status" id="status"></p>
    </main>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      var t = window.TrelloPowerUp.iframe();

      function resize() {
        t.sizeTo("body");
      }

      function getLabelIds(card) {
        var labels = card && Array.isArray(card.labels) ? card.labels : [];

        return labels
          .map(function (label) {
            return label && typeof label.id === "string" ? label.id.trim() : "";
          })
          .filter(Boolean);
      }

      function setStatus(text) {
        document.getElementById("status").textContent = text;
        resize();
      }

      function setMessage(text) {
        var routesElement = document.getElementById("routes");
        var message = document.createElement("p");

        routesElement.textContent = "";
        message.className = "status";
        message.textContent = text;
        routesElement.appendChild(message);
        resize();
      }

      async function resolveProjectFolder() {
        var card = await t.card("labels");
        var board = await t.board("id");
        var boardId = board && typeof board.id === "string" ? board.id.trim() : "";
        var labelIds = getLabelIds(card);

        if (!boardId || labelIds.length === 0) {
          return { matched: false, routes: [] };
        }

        var response = await fetch("/api/project-folder/resolve", {
          method: "POST",
          headers: {
            "content-type": "application/json",
          },
          body: JSON.stringify({ boardId: boardId, labelIds: labelIds }),
        });

        if (!response.ok) {
          throw new Error("Could not load project folders.");
        }

        return response.json();
      }

      function createCopyButton(folderPath) {
        var button = document.createElement("button");

        button.type = "button";
        button.textContent = "Copy Path";
        button.addEventListener("click", async function () {
          try {
            await navigator.clipboard.writeText(folderPath);
            setStatus("Path copied.");
          } catch (_error) {
            setStatus("Select the path and copy it manually.");
          }
        });

        return button;
      }

      function renderRoute(route) {
        var routeElement = document.createElement("article");
        var head = document.createElement("div");
        var title = document.createElement("p");
        var path = document.createElement("p");
        var folderPath =
          typeof route.folderPath === "string" ? route.folderPath : "";
        var labelName =
          typeof route.labelName === "string" && route.labelName.trim()
            ? route.labelName.trim()
            : "Project";

        routeElement.className = "route";
        head.className = "route-head";
        title.className = "route-title";
        title.textContent = labelName;
        path.className = "path";
        path.textContent = folderPath || "No folder path found.";

        head.appendChild(title);
        head.appendChild(createCopyButton(folderPath));
        routeElement.appendChild(head);
        routeElement.appendChild(path);

        return routeElement;
      }

      async function loadProjectFolder() {
        try {
          var result = await resolveProjectFolder();
          var routesElement = document.getElementById("routes");
          var routes =
            result && Array.isArray(result.routes) ? result.routes : [];

          routesElement.textContent = "";

          if (!result || !result.matched || routes.length === 0) {
            setMessage("No project folder matches this card.");
            return;
          }

          routes.forEach(function (route) {
            routesElement.appendChild(renderRoute(route));
          });

          setStatus("");
          resize();
        } catch (_error) {
          setMessage("Could not load project folders.");
        }
      }

      t.render(function () {
        setMessage("Loading project folders...");
        return loadProjectFolder().then(resize);
      });
    </script>
  </body>
</html>
