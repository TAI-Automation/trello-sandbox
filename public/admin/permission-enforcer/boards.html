<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Permission Enforcement Boards</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f6f7f9;
        color: #172b4d;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      form {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      input {
        flex: 1;
        min-width: 220px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 14px;
      }

      button {
        border: 1px solid #0c66e4;
        border-radius: 6px;
        background: #0c66e4;
        color: white;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        padding: 10px 14px;
      }

      button.secondary {
        background: white;
        color: #0c66e4;
      }

      button.danger {
        border-color: #c9372c;
        background: #c9372c;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        min-height: 22px;
        margin: 0 0 16px;
        color: #626f86;
      }

      .error {
        color: #ae2a19;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border: 1px solid #dfe1e6;
        border-radius: 8px;
        overflow: hidden;
      }

      th,
      td {
        border-bottom: 1px solid #dfe1e6;
        padding: 12px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f1f2f4;
        font-size: 12px;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      code {
        display: inline-block;
        max-width: 260px;
        overflow-wrap: anywhere;
      }

      .muted {
        color: #626f86;
        font-size: 13px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        padding: 4px 8px;
      }

      .pill.on {
        background: #dcfff1;
        color: #216e4e;
      }

      .pill.off {
        background: #ffebe6;
        color: #ae2a19;
      }

      @media (max-width: 760px) {
        header,
        form {
          align-items: stretch;
          flex-direction: column;
        }

        table,
        thead,
        tbody,
        tr,
        th,
        td {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          border-bottom: 1px solid #dfe1e6;
        }

        td {
          border-bottom: 0;
        }

        td::before {
          color: #626f86;
          content: attr(data-label);
          display: block;
          font-size: 12px;
          font-weight: 700;
          margin-bottom: 4px;
          text-transform: uppercase;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Permission Enforcement Boards</h1>
          <p class="muted">Manage Trello board webhooks for permission enforcement.</p>
        </div>
        <div class="actions">
          <button id="refreshButton" class="secondary" type="button">Refresh</button>
        </div>
      </header>

      <form id="addBoardForm">
        <input
          id="boardIdInput"
          autocomplete="off"
          placeholder="Trello board ID"
          required
        />
        <button type="submit">Add board</button>
      </form>

      <p id="status" class="status"></p>

      <table>
        <thead>
          <tr>
            <th>Board</th>
            <th>Enforcement</th>
            <th>Webhook</th>
            <th>Last checked</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="boardsBody">
          <tr>
            <td colspan="5">Loading boards...</td>
          </tr>
        </tbody>
      </table>
    </main>

    <script src="/admin/permission-enforcer/boards.js"></script>
  </body>
</html>
