<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Label Search Section</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --border: #dfe1e6;
        --muted: #626f86;
        --soft: #f1f2f4;
        --surface: #ffffff;
        --text: #172b4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--surface);
        color: var(--text);
        margin: 0;
      }

      main {
        display: grid;
        gap: 8px;
        padding: 0 0 2px;
      }

      input {
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        min-height: 34px;
        padding: 7px 9px;
        width: 100%;
      }

      .note,
      .empty {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .results {
        display: grid;
        gap: 6px;
      }

      .result {
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 6px;
        display: grid;
        gap: 8px;
        grid-template-columns: 14px 1fr;
        min-height: 36px;
        padding: 7px 8px;
      }

      .swatch {
        border-radius: 3px;
        height: 14px;
        width: 14px;
      }

      .label-name {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.25;
        margin: 0;
        overflow-wrap: anywhere;
      }

      .meta {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.25;
        margin: 1px 0 0;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="note">Read-only search. Apply label coming later.</p>
      <input
        id="query"
        type="search"
        autocomplete="off"
        placeholder="Search board labels"
      />
      <section class="results" id="results">
        <p class="empty">Start typing to search labels.</p>
      </section>
    </main>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      var t = window.TrelloPowerUp.iframe();
      var boardId = "";
      var cardId = "";
      var searchTimer = 0;

      var colorMap = {
        green: "#4bce97",
        yellow: "#f5cd47",
        orange: "#fea362",
        red: "#f87168",
        purple: "#9f8fef",
        blue: "#579dff",
        sky: "#6cc3e0",
        lime: "#94c748",
        pink: "#e774bb",
        black: "#8590a2",
      };

      function resize() {
        t.sizeTo("body");
      }

      function clearResults(message) {
        var results = document.getElementById("results");
        results.textContent = "";

        var empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = message;
        results.appendChild(empty);
        resize();
      }

      function renderResults(items, query) {
        var results = document.getElementById("results");
        results.textContent = "";

        if (!query.trim()) {
          clearResults("Start typing to search labels.");
          return;
        }

        if (!items.length) {
          clearResults("No matching labels found.");
          return;
        }

        items.slice(0, 8).forEach(function (item) {
          var row = document.createElement("article");
          var swatch = document.createElement("span");
          var content = document.createElement("div");
          var name = document.createElement("p");
          var meta = document.createElement("p");

          row.className = "result";
          swatch.className = "swatch";
          swatch.style.background = colorMap[item.color] || "#dfe1e6";
          swatch.title = item.color || "No color";
          name.className = "label-name";
          name.textContent = item.name || "(blank label)";
          meta.className = "meta";
          meta.textContent =
            "Score " + item.score + " - " + (item.matchedReason || "Match");

          content.appendChild(name);
          content.appendChild(meta);
          row.appendChild(swatch);
          row.appendChild(content);
          results.appendChild(row);
        });

        resize();
      }

      async function searchLabels() {
        var query = document.getElementById("query").value;

        if (!boardId) {
          clearResults("Could not determine the current board.");
          return;
        }

        if (!query.trim()) {
          clearResults("Start typing to search labels.");
          return;
        }

        var response = await fetch(
          "/api/label-search/search?boardId=" +
            encodeURIComponent(boardId) +
            "&q=" +
            encodeURIComponent(query)
        );

        if (!response.ok) {
          throw new Error("Label search failed.");
        }

        var body = await response.json();
        var results = Array.isArray(body.results) ? body.results : [];

        renderResults(results, query);
      }

      function scheduleSearch() {
        window.clearTimeout(searchTimer);
        searchTimer = window.setTimeout(function () {
          searchLabels().catch(function () {
            clearResults("Could not search labels.");
          });
        }, 180);
      }

      async function loadContext() {
        var board = await t.board("id");
        var card = await t.card("id");

        boardId = board && board.id ? board.id : "";
        cardId = card && card.id ? card.id : "";

        if (!boardId || !cardId) {
          throw new Error("Could not determine the current card context.");
        }

        resize();
      }

      document.getElementById("query").addEventListener("input", scheduleSearch);

      t.render(function () {
        return loadContext()
          .catch(function () {
            clearResults("Close and reopen this card to load label search.");
          })
          .then(resize);
      });
    </script>
  </body>
</html>
