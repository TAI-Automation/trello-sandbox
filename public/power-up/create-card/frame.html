<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Card</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --border: #dfe1e6;
        --muted: #6b778c;
        --text: #172b4d;
        --surface: #ffffff;
        --soft: #f4f5f7;
        --brand: #0c66e4;
        --danger: #ae2e24;
        --danger-border: #ffbdad;
        --success: #216e4e;
        --success-border: #baf3db;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--surface);
        color: var(--text);
      }

      main {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      header {
        border-bottom: 1px solid var(--border);
        display: grid;
        gap: 4px;
        padding-bottom: 12px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
      }

      label {
        color: var(--muted);
        display: grid;
        font-size: 12px;
        gap: 4px;
      }

      input,
      select {
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        min-height: 36px;
        padding: 7px 8px;
        width: 100%;
      }

      select:disabled,
      input:disabled {
        background: var(--soft);
        cursor: not-allowed;
      }

      button {
        align-items: center;
        background: var(--brand);
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-size: 13px;
        justify-content: center;
        min-height: 34px;
        padding: 7px 12px;
      }

      button.secondary {
        background: var(--soft);
        color: var(--text);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      form {
        display: grid;
        gap: 12px;
      }

      .form-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      }

      .wide {
        grid-column: 1 / -1;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .message {
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
        padding: 12px;
      }

      .message.error {
        border-color: var(--danger-border);
        color: var(--danger);
      }

      .message.success {
        border-color: var(--success-border);
        color: var(--success);
      }

      .project-managers {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Create Card</h1>
        <p class="status" id="status">Loading available projects...</p>
      </header>
      <section id="message"></section>
      <form id="createCardForm" hidden>
        <label class="wide"
          >Card name
          <input name="name" required maxlength="16384" autocomplete="off" />
        </label>
        <div class="form-grid">
          <label
            >Project
            <select name="projectId" required></select>
          </label>
          <label
            >Starting list
            <select name="listId" required></select>
          </label>
        </div>
        <p class="project-managers" id="projectManagers"></p>
        <div class="actions">
          <button type="submit" id="submitButton">Create</button>
          <button type="button" class="secondary" id="closeButton">Close</button>
        </div>
      </form>
    </main>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      var currentMemberId = "";
      var currentBoardId = "";
      var currentState = null;
      var t = window.TrelloPowerUp.iframe();

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function showMessage(text, type) {
        var target = document.getElementById("message");
        target.innerHTML = text
          ? '<div class="message ' +
            (type || "") +
            '">' +
            escapeHtml(text) +
            "</div>"
          : "";
      }

      function setStatus(text) {
        document.getElementById("status").textContent = text;
      }

      function optionHtml(value, label) {
        return (
          '<option value="' +
          escapeHtml(value) +
          '">' +
          escapeHtml(label) +
          "</option>"
        );
      }

      function renderForm() {
        var form = document.getElementById("createCardForm");
        var projectSelect = form.elements.projectId;
        var listSelect = form.elements.listId;

        projectSelect.innerHTML = currentState.projects
          .map(function (project) {
            return optionHtml(project.id, project.name);
          })
          .join("");
        listSelect.innerHTML = currentState.lists
          .map(function (list) {
            return optionHtml(list.id, list.name);
          })
          .join("");

        updateSubmitState();
        updateProjectManagerPreview();
        form.hidden = false;
        setStatus(currentState.projects.length + " synced projects available");
      }

      function updateProjectManagerPreview() {
        var form = document.getElementById("createCardForm");
        var projectId = String(form.elements.projectId.value || "");
        var project = currentState.projects.find(function (item) {
          return item.id === projectId;
        });
        var managers = project && project.projectManagers ? project.projectManagers : [];
        document.getElementById("projectManagers").textContent = managers.length
          ? "Project Manager(s): " +
            managers
              .map(function (manager) {
                return manager.displayName;
              })
              .join(", ")
          : "No project managers configured for this project.";
      }

      function updateSubmitState() {
        var form = document.getElementById("createCardForm");
        var button = document.getElementById("submitButton");

        button.disabled =
          !String(form.elements.name.value || "").trim() ||
          !String(form.elements.projectId.value || "") ||
          !String(form.elements.listId.value || "");
        updateProjectManagerPreview();
      }

      async function apiRequest(url, body) {
        var response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        if (!response.ok) {
          var errorBody = await response.json().catch(function () {
            return {};
          });
          throw new Error(errorBody.error || "Request failed.");
        }

        return response.json();
      }

      async function loadState() {
        var member = await t.member("id");
        var board = await t.board("id");

        if (!member || !member.id) {
          throw new Error("Could not determine the current Trello member.");
        }

        if (!board || !board.id) {
          throw new Error("Could not determine the current Trello board.");
        }

        currentMemberId = member.id;
        currentBoardId = board.id;
        currentState = await apiRequest("/api/create-card/state", {
          trelloMemberId: currentMemberId,
          trelloBoardId: currentBoardId,
        });

        if (currentState.lists.length === 0) {
          setStatus("No open lists are available.");
          showMessage("This board does not have any open lists.", "error");
          return;
        }

        if (currentState.projects.length === 0) {
          setStatus("No projects are available.");
          showMessage(
            "No projects with synced labels are available on this board.",
            "error"
          );
          return;
        }

        renderForm();
      }

      async function submitForm(event) {
        event.preventDefault();
        showMessage("", "");

        var form = event.currentTarget;
        var button = document.getElementById("submitButton");

        try {
          button.disabled = true;
          var result = await apiRequest("/api/create-card/cards", {
            trelloMemberId: currentMemberId,
            trelloBoardId: currentBoardId,
            name: String(form.elements.name.value || "").trim(),
            projectId: String(form.elements.projectId.value || ""),
            listId: String(form.elements.listId.value || ""),
          });

          showMessage(
            'Created "' +
              (result.card.name || form.elements.name.value.trim()) +
              '".',
            "success"
          );
          window.setTimeout(function () {
            t.closeModal();
          }, 900);
          form.reset();
          renderForm();
        } catch (error) {
          showMessage(error.message || error, "error");
        } finally {
          updateSubmitState();
        }
      }

      document
        .getElementById("createCardForm")
        .addEventListener("submit", submitForm);
      document
        .getElementById("createCardForm")
        .addEventListener("input", updateSubmitState);
      document.getElementById("closeButton").addEventListener("click", function () {
        t.closeModal();
      });

      loadState().catch(function (error) {
        setStatus("Could not load card creation options.");
        showMessage(error.message || error, "error");
      });
    </script>
  </body>
</html>
